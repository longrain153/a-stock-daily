name: A股每日复盘

on:
  schedule:
    # GitHub cron 用 UTC；北京时间 18:00 = UTC 10:00。工作日（周一至周五）运行。
    # 注意：GitHub Actions 定时任务可能因负载延迟若干分钟，属正常现象。
    - cron: "0 10 * * 1-5"
  workflow_dispatch:        # 支持在 Actions 页面手动触发（用于测试）
    inputs:
      force:
        description: "强制发送（即便当天休市，用最近收盘数据测试）"
        type: boolean
        default: true

# 避免同一时刻重复运行
concurrency:
  group: a-stock-daily
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          FORCE_SEND: ${{ github.event.inputs.force }}
        run: python main.py
