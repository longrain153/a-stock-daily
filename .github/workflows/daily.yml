name: A股每日复盘

on:
  schedule:
    # 北京约 18:08 / 18:23 / 18:38 三次冗余触发（UTC 10:08/10:23/10:38）。工作日。
    # GitHub 定时常丢任务，多触发几次提高命中率；配合 SKIP_IF_DONE 去重，当天只发一次。
    - cron: "8 10 * * 1-5"
    - cron: "23 10 * * 1-5"
    - cron: "38 10 * * 1-5"
  workflow_dispatch:        # 支持在 Actions 页面手动触发（用于测试）
    inputs:
      force:
        description: "强制发送（即便当天休市，用最近收盘数据测试）"
        type: boolean
        default: true

# 避免同一时刻重复运行
concurrency:
  group: a-stock-daily
  cancel-in-progress: false

permissions:
  contents: write        # 允许把生成的报告提交回仓库(用于 GitHub Pages)

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          PAGES_BASE: https://longrain153.github.io/a-stock-daily
          FORCE_SEND: ${{ github.event.inputs.force }}
          SKIP_IF_DONE: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: python main.py

      - name: Publish report to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "no report changes to publish"
          else
            git commit -m "report: publish $(date -u +%Y-%m-%d)"
            git push
          fi
